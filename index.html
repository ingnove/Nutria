<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feliz Cumpleaños</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #f7971e;
      --secondary: #ff6bcb;
      --accent: #a855f7;
      --bg-dark: #0f0720;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(247, 151, 30, 0.15) 0%, transparent 40%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      color: #fff;
    }

    /* ── Background Particles ── */
    .bg-elements { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    
    /* ── CSS Decorative Icons ── */
    .icon-css { position: absolute; pointer-events: none; }

    .star-css {
      width: 20px; height: 20px; background: white;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      opacity: 0.3; animation: blink 3s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } }

    .balloon-css {
      width: 30px; height: 38px; background: var(--accent); border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      position: relative; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.3);
    }
    .balloon-css::after {
      content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
      border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 6px solid var(--accent);
    }

    /* ── Premium Card ── */
    .card {
      position: relative; z-index: 10;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 70px 50px 50px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
      animation: cardAppear 1s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: transform 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); }

    @keyframes cardAppear {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ── Header Decoration ── */
    .card-header-deco {
      position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px;
    }
    .deco-item { animation: bounce 3s ease-in-out infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

    /* ── Photo ── */
    .photo-container {
      position: relative; width: 150px; height: 150px; margin: 0 auto 30px;
    }
    .photo-border {
      position: absolute; inset: -5px;
      background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), #06b6d4);
      border-radius: 50%;
      animation: rotate-gradient 6s linear infinite;
    }
    @keyframes rotate-gradient { 0% { transform: rotate(0deg); filter: hue-rotate(0deg); } 100% { transform: rotate(360deg); filter: hue-rotate(360deg); } }
    
    .photo-img {
      position: relative; width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
      border: 5px solid var(--bg-dark);
      z-index: 2;
    }

    /* ── Typography ── */
    .tag {
      display: inline-block; padding: 6px 15px; border-radius: 20px;
      background: rgba(247, 151, 30, 0.15); color: var(--primary);
      font-size: 0.8rem; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 15px;
    }
    h1 {
      font-family: 'Pacifico', cursive; font-size: 3rem; margin-bottom: 10px;
      background: linear-gradient(to right, #fff, #f7971e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 1.1rem; color: rgba(255,255,255,0.6); font-weight: 400; margin-bottom: 30px; }

    .divider {
      width: 60px; height: 4px; background: var(--primary);
      margin: 0 auto 30px; border-radius: 2px; opacity: 0.5;
    }

    .main-message { font-size: 1.1rem; line-height: 1.8; margin-bottom: 40px; color: rgba(255,255,255,0.9); }
    .main-message strong { color: var(--secondary); font-weight: 600; }

    /* ── Feature Grid (replaces chips) ── */
    .features {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px;
    }
    .feature-item {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 15px; border-radius: 20px; text-align: left;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.3s;
    }
    .feature-item:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
    
    .dot-icon { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
    .feature-text { font-size: 0.9rem; font-weight: 600; }

    /* ── Main Action Button ── */
    .main-btn {
      width: 100%; padding: 20px; border-radius: 25px;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      color: white; border: none; font-family: inherit;
      font-size: 1.2rem; font-weight: 800; cursor: pointer;
      box-shadow: 0 15px 40px rgba(168, 85, 247, 0.4);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; overflow: hidden;
    }
    .main-btn:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(168, 85, 247, 0.6); }
    .main-btn:active { transform: scale(0.95); }

    /* ── Controls ── */
    .controls { position: fixed; top: 30px; right: 30px; z-index: 100; }
    .control-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 20px; border-radius: 15px; color: white; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .control-btn:hover { background: rgba(255,255,255,0.1); }

    /* ── Burst Elements ── */
    .burst-icon {
      position: fixed; pointer-events: none; z-index: 2000;
      animation: icon-float 2.5s ease-out forwards;
    }
    @keyframes icon-float {
      0% { transform: translate(-50%, -50%) scale(0) rotate(0); opacity: 1; }
      20% { transform: translate(-50%, -150%) scale(1.2) rotate(45deg); opacity: 1; }
      100% { transform: translate(-50%, 400px) scale(1) rotate(360deg); opacity: 0; }
    }

    .gift-box {
      width: 30px; height: 30px; background: var(--secondary); position: relative; border-radius: 4px;
    }
    .gift-box::before { content:''; position:absolute; top:50%; left:0; width:100%; height:4px; background:white; transform:translateY(-50%); }
    .gift-box::after { content:''; position:absolute; left:50%; top:0; width:4px; height:100%; background:white; transform:translateX(-50%); }

  </style>
</head>
<body>

  <div class="bg-elements" id="bgParticles"></div>
  <div class="controls">
    <button class="control-btn" id="soundBtn" onclick="toggleSound()">Musica: OFF</button>
  </div>

  <div class="card">
    <div class="card-header-deco">
      <div class="deco-item"><div class="balloon-css" style="background: var(--primary);"></div></div>
      <div class="deco-item" style="animation-delay: 0.5s;"><div class="balloon-css" style="background: var(--secondary);"></div></div>
      <div class="deco-item" style="animation-delay: 1s;"><div class="balloon-css" style="background: var(--accent);"></div></div>
    </div>

    <div class="photo-container">
      <div class="photo-border"></div>
      <img src="https://pbs.twimg.com/profile_images/1285206015814758402/4cdaMv7X_400x400.jpg" class="photo-img" alt="Birthday Profile" />
    </div>

    <span class="tag">Dia Especial</span>
    <h1>Feliz Cumpleaños</h1>
    <p class="subtitle">Celebrando un año increible</p>

    <div class="divider"></div>

    <p class="main-message">
      Deseamos que este dia este lleno de momentos inolvidables.<br/>
      Que la <strong>prosperidad</strong> y el <strong>exito</strong> te acompañen siempre en cada nuevo proyecto.
    </p>

    <div class="features">
      <div class="feature-item">
        <div class="dot-icon" style="background: var(--primary);"></div>
        <span class="feature-text">Salud y Bienestar</span>
      </div>
      <div class="feature-item">
        <div class="dot-icon" style="background: var(--secondary);"></div>
        <span class="feature-text">Exito Constante</span>
      </div>
      <div class="feature-item">
        <div class="dot-icon" style="background: var(--accent);"></div>
        <span class="feature-text">Nuevas Aventuras</span>
      </div>
      <div class="feature-item">
        <div class="dot-icon" style="background: #06b6d4;"></div>
        <span class="feature-text">Gran Alegria</span>
      </div>
    </div>

    <button class="main-btn" onclick="celebrate()">INICIAR CELEBRACION</button>
  </div>

  <script>
    // ── Static background elements ──
    const bg = document.getElementById('bgParticles');
    for (let i = 0; i < 40; i++) {
      const star = document.createElement('div');
      star.classList.add('star-css');
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      bg.appendChild(star);
    }

    // ── Audio logic ──
    let audioCtx = null;
    let musicPlaying = false;
    let scheduledNodes = [];

    const MELODY = [
      [261.6, 0.5], [261.6, 0.5], [293.7, 1], [261.6, 1], [349.2, 1], [329.6, 2],
      [261.6, 0.5], [261.6, 0.5], [293.7, 1], [261.6, 1], [392.0, 1], [349.2, 2],
      [261.6, 0.5], [261.6, 0.5], [523.3, 1], [440.0, 1], [349.2, 1], [329.6, 1], [293.7, 2],
      [466.2, 0.5], [466.2, 0.5], [440.0, 1], [349.2, 1], [392.0, 1], [349.2, 2]
    ];

    function playMusic() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      scheduledNodes = [];
      let now = audioCtx.currentTime + 0.1;
      const beat = 0.55;

      MELODY.forEach(([freq, dur]) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.15, now + 0.05);
        g.gain.linearRampToValueAtTime(0, now + dur * beat);
        
        osc.connect(g).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur * beat);
        scheduledNodes.push(osc);
        now += dur * beat;
      });

      const totalTime = MELODY.reduce((acc, curr) => acc + curr[1], 0) * beat * 1000;
      scheduledNodes._timer = setTimeout(() => { if(musicPlaying) playMusic(); }, totalTime + 500);
    }

    function toggleSound(on = null) {
      musicPlaying = (on !== null) ? on : !musicPlaying;
      const btn = document.getElementById('soundBtn');
      if (musicPlaying) {
        playMusic();
        btn.textContent = "Musica: ON";
      } else {
        scheduledNodes.forEach(n => n.stop());
        clearTimeout(scheduledNodes._timer);
        btn.textContent = "Musica: OFF";
      }
    }

    // ── Celebration action ──
    function celebrate() {
      if (!musicPlaying) toggleSound(true);

      const count = 40;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'burst-icon';
          
          // Randomize icon type
          const rand = Math.random();
          if (rand < 0.33) {
            el.innerHTML = '<div class="gift-box"></div>';
          } else if (rand < 0.66) {
            el.innerHTML = '<div class="balloon-css" style="background:'+['#f7971e','#ff6bcb','#a855f7'][Math.floor(Math.random()*3)]+'"></div>';
          } else {
            el.innerHTML = '<div class="star-css" style="opacity:1; width:25px; height:25px; background:gold;"></div>';
          }

          el.style.left = (Math.random() * 100) + '%';
          el.style.top = (60 + Math.random() * 20) + '%';
          document.body.appendChild(el);
          
          setTimeout(() => el.remove(), 3000);
        }, i * 50);
      }
    }
  </script>
</body>
</html>
