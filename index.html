<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¡Feliz Cumpleaños! 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0533 0%, #2d0b6b 40%, #0d1f5c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ── Confetti ── */
    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .dot {
      position: absolute;
      border-radius: 50%;
      animation: fall linear infinite;
      opacity: 0.85;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── CSS Icons ── */
    .icon {
      position: absolute;
      pointer-events: none;
      z-index: 1000;
      animation: icon-pop 2s ease-out forwards;
    }

    @keyframes icon-pop {
      0% { transform: scale(0) translateY(0) rotate(0deg); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: scale(1.2) translateY(400px) rotate(360deg); opacity: 0; }
    }

    .gift {
      width: 40px; height: 40px; background: #ff6bcb; border-radius: 4px;
      position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .gift::before { content:''; position:absolute; top:50%; left:0; width:100%; height:4px; background:#fff; transform:translateY(-50%); }
    .gift::after { content:''; position:absolute; left:50%; top:0; width:4px; height:100%; background:#fff; transform:translateX(-50%); }

    .star {
      width: 40px; height: 40px; background: #f7971e;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      box-shadow: 0 0 15px #f7971e;
    }

    .balloon-css {
      width: 35px; height: 45px; background: #a855f7; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      position: relative; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
    }
    .balloon-css::after {
      content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
      border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 8px solid #a855f7;
    }

    /* ── Floating balloons (background) ── */
    .balloon-bg {
      position: fixed;
      bottom: -100px;
      pointer-events: none;
      z-index: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-6deg); opacity: 0.9; }
      50%  { transform: translateY(-45vh) rotate(6deg); opacity: 0.85; }
      100% { transform: translateY(-105vh) rotate(-4deg); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 32px;
      padding: 60px 40px 40px;
      max-width: 460px;
      width: 92%;
      text-align: center;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
      animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Balloons deco ── */
    .balloons-header {
      position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 15px; animation: sway 4s ease-in-out infinite alternate;
    }
    @keyframes sway { from { transform: translateX(-50%) rotate(-5deg); } to { transform: translateX(-50%) rotate(5deg); } }

    /* ── Photo ── */
    .photo-ring {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f7971e, #ff6bcb, #a855f7, #06b6d4);
      padding: 5px;
      margin: 0 auto 25px;
      animation: spin-ring 8s linear infinite;
      box-shadow: 0 0 30px rgba(168,85,247,0.4);
    }
    @keyframes spin-ring { to { filter: hue-rotate(360deg); } }
    .photo-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #1a0533;
      display: block;
    }

    /* ── Text ── */
    .label {
      font-size: 0.85rem; font-weight: 800; letter-spacing: 5px;
      text-transform: uppercase; color: #f7971e; margin-bottom: 8px;
    }
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2.8rem;
      background: linear-gradient(90deg, #f7971e, #ff6bcb, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2; margin-bottom: 10px;
    }
    .subtitle { font-size: 1.1rem; color: rgba(255,255,255,0.8); font-weight: 600; margin-bottom: 28px; }
    .divider {
      width: 80px; height: 4px;
      background: linear-gradient(90deg, #f7971e, #a855f7);
      border-radius: 999px; margin: 0 auto 28px;
    }
    .message { font-size: 1.05rem; line-height: 1.8; color: rgba(255,255,255,0.9); margin-bottom: 32px; }
    .message strong { color: #f7c6f7; }

    /* ── Chips ── */
    .wishes { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 35px; }
    .chip {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px; padding: 8px 20px;
      font-size: 0.9rem; color: #e0d4ff; font-weight: 600;
      transition: all 0.3s ease;
    }
    .chip:hover { background: rgba(168,85,247,0.4); transform: translateY(-2px); border-color: rgba(255,255,255,0.5); }

    /* ── Button ── */
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #f7971e, #a855f7);
      color: #fff; font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 1.2rem; padding: 16px 45px; border-radius: 999px;
      cursor: pointer; border: none;
      box-shadow: 0 10px 30px rgba(168,85,247,0.5);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 40px rgba(168,85,247,0.7); }
    .btn:active { transform: translateY(-2px) scale(0.98); }

    #soundBtn {
      position: fixed; top: 20px; right: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px; padding: 10px 20px;
      color: #fff; font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer; z-index: 100;
      backdrop-filter: blur(15px);
      transition: all 0.3s;
    }
    #soundBtn:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <div class="confetti-wrap" id="confetti"></div>
  <div id="balloonsBg"></div>

  <button id="soundBtn" onclick="toggleSound()">🔊 Música: OFF</button>

  <div class="card">
    <div class="balloons-header">
      <div class="balloon-css" style="background: #ff6bcb;"></div>
      <div class="balloon-css" style="background: #06b6d4;"></div>
      <div class="balloon-css" style="background: #f7971e;"></div>
    </div>

    <div class="photo-ring">
      <img src="https://pbs.twimg.com/profile_images/1285206015814758402/4cdaMv7X_400x400.jpg" alt="Foto de cumpleañero" />
    </div>

    <p class="label">✨ Hoy es tu día ✨</p>
    <h1>¡Feliz Cumpleaños!</h1>
    <p class="subtitle">¡Que inicie la gran celebración! 🎂</p>

    <div class="divider"></div>

    <p class="message">
      En este día tan especial queremos desearte todo lo mejor.<br/>
      Que cada uno de tus <strong>sueños se hagan realidad</strong>,
      que la vida te sonría siempre.<br/>
      <strong>¡Salud, éxito y mucha felicidad!</strong>
    </p>

    <div class="wishes">
      <span class="chip">🌟 Salud</span>
      <span class="chip">🚀 Éxito</span>
      <span class="chip">🌍 Aventuras</span>
      <span class="chip">🍀 Prosperidad</span>
    </div>

    <button class="btn" onclick="celebrate()">✨ ¡CELEBRAR! ✨</button>
  </div>

  <script>
    // ─────────────────────────────────────────
    //  CONFETTI
    // ─────────────────────────────────────────
    const wrap = document.getElementById('confetti');
    const colors = ['#f7971e','#ff6bcb','#a855f7','#06b6d4','#fbbf24','#34d399','#f87171'];
    for (let i = 0; i < 50; i++) {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      const size = Math.random() * 8 + 4;
      dot.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        top:${Math.random()*-20}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${Math.random()*6+4}s;
        animation-delay:${Math.random()*5}s;
        border-radius: 50%;
      `;
      wrap.appendChild(dot);
    }

    // ─────────────────────────────────────────
    //  FLOATING BALLOONS (background)
    // ─────────────────────────────────────────
    const bgColors = ['#ff6bcb', '#06b6d4', '#f7971e', '#a855f7', '#34d399'];
    const bgWrap = document.getElementById('balloonsBg');
    for (let i = 0; i < 12; i++) {
      const b = document.createElement('div');
      b.classList.add('balloon-bg');
      b.classList.add('balloon-css');
      b.style.background = bgColors[Math.floor(Math.random()*bgColors.length)];
      b.style.setProperty('--after-color', b.style.background);
      
      const dur = 8 + Math.random() * 8;
      const delay = Math.random() * 10;
      const left = Math.random() * 95;
      const scale = 0.5 + Math.random();
      
      b.style.left = left + '%';
      b.style.animationDuration = dur + 's';
      b.style.animationDelay = delay + 's';
      b.style.transform = `scale(${scale})`;
      bgWrap.appendChild(b);
    }

    // ─────────────────────────────────────────
    //  WEB AUDIO - Happy Birthday
    // ─────────────────────────────────────────
    let audioCtx = null;
    let musicPlaying = false;
    let scheduledNodes = [];

    const HB_NOTES = [
      [264, 0.5],[264, 0.5],[297, 1],[264, 1],[352, 1],[330, 2],
      [264, 0.5],[264, 0.5],[297, 1],[264, 1],[396, 1],[352, 2],
      [264, 0.5],[264, 0.5],[528, 1],[440, 1],[352, 1],[330, 1],[297, 2],
      [466, 0.5],[466, 0.5],[440, 1],[352, 1],[396, 1],[352, 2],
    ];

    function playMelody() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      scheduledNodes = [];
      const bpm = 110;
      const beat = 60 / bpm;
      let t = audioCtx.currentTime + 0.1;

      HB_NOTES.forEach(([freq, dur]) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'triangle'; // Softer sound
        osc.frequency.setValueAtTime(freq, t);

        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
        gain.gain.setValueAtTime(0.2, t + beat * dur - 0.05);
        gain.gain.linearRampToValueAtTime(0, t + beat * dur);

        osc.start(t);
        osc.stop(t + beat * dur);
        scheduledNodes.push(osc);
        t += beat * dur;
      });

      const totalDur = HB_NOTES.reduce((s,[,d]) => s + d, 0) * beat * 1000;
      scheduledNodes._loopTimer = setTimeout(() => {
        if (musicPlaying) playMelody();
      }, totalDur + 500);
    }

    function stopMelody() {
      scheduledNodes.forEach(n => { try { n.stop(); } catch(e){} });
      clearTimeout(scheduledNodes._loopTimer);
      scheduledNodes = [];
    }

    function toggleSound(forceOn = false) {
      const btn = document.getElementById('soundBtn');
      if (forceOn || !musicPlaying) {
        musicPlaying = true;
        playMelody();
        btn.textContent = '🔊 Música: ON';
      } else {
        musicPlaying = false;
        stopMelody();
        btn.textContent = '🔇 Música: OFF';
      }
    }

    // ─────────────────────────────────────────
    //  CELEBRATE BUTTON
    // ─────────────────────────────────────────
    function celebrate() {
      // 1. Activar música si no está sonando
      if (!musicPlaying) {
        toggleSound(true);
      }

      // 2. Burst de iconos CSS
      const iconTypes = ['gift', 'star', 'balloon-css'];
      for (let i = 0; i < 30; i++) {
        const type = iconTypes[Math.floor(Math.random() * iconTypes.length)];
        const el = document.createElement('div');
        el.classList.add('icon', type);
        
        const startX = Math.random() * window.innerWidth;
        const startY = Math.random() * (window.innerHeight / 2);
        
        el.style.left = startX + 'px';
        el.style.top = startY + 'px';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        
        // Random colors for icons
        if (type === 'balloon-css') el.style.background = bgColors[Math.floor(Math.random()*bgColors.length)];
        if (type === 'gift') el.style.background = colors[Math.floor(Math.random()*colors.length)];
        
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }

      // 3. Extra confetti
      for (let i = 0; i < 50; i++) {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        dot.style.cssText = `
          width: 8px; height: 8px;
          left: ${Math.random()*100}%;
          top: -20px;
          background: ${colors[Math.floor(Math.random()*colors.length)]};
          animation-duration: ${Math.random()*2+1}s;
          border-radius: 50%;
        `;
        wrap.appendChild(dot);
        setTimeout(() => dot.remove(), 3000);
      }
    }
  </script>
</body>
</html>
