<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Feliz Cumpleaños</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #f7971e;
      --secondary: #ff6bcb;
      --accent: #a855f7;
      --bg-dark: #0f0720;
      --bg-deep: #05020a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      width: 100%;
      min-height: 100vh;
      background: var(--bg-deep);
      overflow-x: hidden;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, var(--bg-deep) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      margin: 0;
      padding: 40px 15px;
      position: relative;
    }

    /* ── Starry Background ── */
    #bgParticles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    
    .star-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }
    
    @keyframes floatUp {
      from { transform: translateY(0); }
      to { transform: translateY(-100vh); }
    }

    .glow-orb {
      position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.4;
      animation: drift 15s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(50px, -50px) scale(1.2); }
    }

    /* ── Magic Sparkles ── */
    .magic-sparkle {
      position: absolute; pointer-events: none;
      animation: pulse-glow 2s ease-in-out infinite alternate;
    }
    .magic-sparkle::before, .magic-sparkle::after {
      content: ''; position: absolute; background: white; border-radius: 50%;
      box-shadow: 0 0 10px white, 0 0 20px var(--primary);
    }
    .magic-sparkle::before { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
    .magic-sparkle::after { height: 100%; width: 2px; left: 50%; transform: translateX(-50%); }

    @keyframes pulse-glow {
      0% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
      100% { opacity: 1; transform: scale(1.3) rotate(90deg); filter: drop-shadow(0 0 15px var(--secondary)); }
    }

    /* ── Containers ── */
    #burstContainer { position: fixed; inset: 0; pointer-events: none; z-index: 2000; overflow: hidden; }
    
    .balloon-css {
      width: 30px; height: 38px; background: var(--accent); border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      position: relative; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.3);
    }
    .balloon-css::after {
      content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
      border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 6px solid var(--accent);
    }

    /* ── Premium Card ── */
    .card-wrapper {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px;
      margin: auto; /* Fixes flexbox cut-off issue */
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 35px;
      padding: 60px 40px 40px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
      animation: cardAppear 1s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 35px 90px rgba(0,0,0,0.9), 0 0 40px rgba(168, 85, 247, 0.2); 
    }

    @keyframes cardAppear {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ── Header Decoration ── */
    .card-header-deco {
      position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px; z-index: 15;
    }
    .deco-item { animation: bounce 3s ease-in-out infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

    /* ── Photo ── */
    .photo-container {
      position: relative; width: 140px; height: 140px; margin: 0 auto 25px;
    }
    .photo-border {
      position: absolute; inset: -6px;
      background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), #06b6d4, var(--primary));
      background-size: 200% 200%;
      border-radius: 50%;
      animation: rotate-gradient 4s linear infinite;
      filter: blur(8px);
      opacity: 0.85;
    }
    .photo-border-inner {
      position: absolute; inset: -2px;
      background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), #06b6d4);
      border-radius: 50%;
      animation: rotate-gradient 6s linear infinite reverse;
    }
    @keyframes rotate-gradient { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    
    .photo-img {
      position: relative; width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
      border: 4px solid var(--bg-dark);
      z-index: 2;
    }
    
    /* Decorative sparkles around photo */
    .photo-sparkle-1 { position: absolute; top: -10px; right: -15px; width: 25px; height: 25px; z-index: 5; animation-delay: 0s; }
    .photo-sparkle-2 { position: absolute; bottom: 5px; left: -20px; width: 15px; height: 15px; z-index: 5; animation-delay: 1s; }

    /* ── Typography ── */
    .tag {
      display: inline-block; padding: 6px 15px; border-radius: 20px;
      background: rgba(247, 151, 30, 0.15); color: var(--primary);
      font-size: 0.8rem; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 15px;
      box-shadow: 0 0 15px rgba(247, 151, 30, 0.2);
    }
    h1 {
      font-family: 'Pacifico', cursive; font-size: 3rem; margin-bottom: 10px;
      background: linear-gradient(to right, #fff, #ffe4b5, var(--primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.6));
    }
    .subtitle { font-size: 1rem; color: rgba(255,255,255,0.7); font-weight: 400; margin-bottom: 25px; letter-spacing: 1px; }

    .divider {
      width: 50px; height: 3px; background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin: 0 auto 25px; border-radius: 2px; opacity: 0.8;
      box-shadow: 0 0 10px var(--primary);
    }

    .main-message { font-size: 1.05rem; line-height: 1.7; margin-bottom: 35px; color: rgba(255,255,255,0.9); }
    .main-message strong { color: var(--secondary); font-weight: 700; text-shadow: 0 0 8px rgba(255, 107, 203, 0.4); }

    /* ── Feature Grid ── */
    .features {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 35px;
    }
    .feature-item {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 15px; border-radius: 18px; text-align: left;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .feature-item::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    .feature-item:hover::before { left: 150%; }
    .feature-item:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
    
    .dot-icon { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); flex-shrink: 0; box-shadow: 0 0 8px var(--primary); }
    .feature-text { font-size: 0.9rem; font-weight: 600; }

    /* ── Main Action Button ── */
    .main-btn {
      width: 100%; padding: 18px; border-radius: 25px;
      background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
      background-size: 200% auto;
      color: white; border: none; font-family: inherit;
      font-size: 1.15rem; font-weight: 800; cursor: pointer;
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4), 0 0 15px rgba(247, 151, 30, 0.4);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; overflow: hidden;
      animation: shimmer 3s infinite linear;
    }
    @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
    .main-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(168, 85, 247, 0.6), 0 0 25px rgba(247, 151, 30, 0.6); }
    .main-btn:active { transform: scale(0.96); }

    /* ── Controls ── */
    .controls { position: fixed; top: 20px; right: 20px; z-index: 100; }
    .control-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 20px; border-radius: 15px; color: white; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; backdrop-filter: blur(10px);
      transition: all 0.3s;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .control-btn:hover { background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

    /* ── Burst Elements ── */
    .burst-icon {
      position: absolute; pointer-events: none;
      animation: icon-fall 3.5s ease-in forwards;
    }
    @keyframes icon-fall {
      0% { transform: translate(-50%, -50px) scale(0) rotate(0); opacity: 1; filter: brightness(1.5); }
      10% { transform: translate(-50%, 0) scale(1.2) rotate(45deg); opacity: 1; filter: brightness(1.2); }
      100% { transform: translate(-50%, 110vh) scale(1) rotate(360deg); opacity: 0; filter: brightness(0.8); }
    }

    .gift-box {
      width: 30px; height: 30px; background: var(--secondary); position: relative; border-radius: 4px;
      box-shadow: 0 0 15px rgba(255, 107, 203, 0.5);
    }
    .gift-box::before { content:''; position:absolute; top:50%; left:0; width:100%; height:4px; background:white; transform:translateY(-50%); }
    .gift-box::after { content:''; position:absolute; left:50%; top:0; width:4px; height:100%; background:white; transform:translateX(-50%); }

    /* ── CSS Star for Burst ── */
    .star-css {
      width: 20px; height: 20px; background: white;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      filter: drop-shadow(0 0 10px gold);
    }

    /* ── Responsive Mobile ── */
    @media (max-width: 500px) {
      body { padding: 80px 15px 40px; } 
      .card { padding: 50px 25px 35px; border-radius: 30px; }
      .photo-container { width: 120px; height: 120px; margin-bottom: 25px; }
      h1 { font-size: 2.2rem; }
      .subtitle { font-size: 0.95rem; margin-bottom: 20px; }
      .main-message { font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; }
      .features { grid-template-columns: 1fr; gap: 10px; margin-bottom: 30px; }
      .feature-item { padding: 12px 15px; border-radius: 15px; }
      .main-btn { padding: 16px; font-size: 1.1rem; }
      .card-header-deco { top: -35px; gap: 12px; }
      .balloon-css { width: 24px; height: 30px; }
      .controls { top: 15px; right: 15px; }
      .control-btn { padding: 8px 16px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <div id="bgParticles">
    <!-- Background Star Layers generated by JS -->
    <div class="glow-orb" style="width: 300px; height: 300px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s;"></div>
    <div class="glow-orb" style="width: 400px; height: 400px; background: var(--accent); bottom: -150px; right: -100px; animation-delay: 2s;"></div>
  </div>
  
  <div id="burstContainer"></div>

  <div class="controls">
    <button class="control-btn" id="soundBtn" onclick="toggleSound()">Musica: OFF</button>
  </div>

  <div class="card-wrapper">
    <div class="card-header-deco">
      <div class="deco-item"><div class="balloon-css" style="background: var(--primary);"></div></div>
      <div class="deco-item" style="animation-delay: 0.5s;"><div class="balloon-css" style="background: var(--secondary);"></div></div>
      <div class="deco-item" style="animation-delay: 1s;"><div class="balloon-css" style="background: var(--accent);"></div></div>
    </div>

    <div class="card">
      <div class="photo-container">
        <div class="photo-border"></div>
        <div class="photo-border-inner"></div>
        <img src="https://pbs.twimg.com/profile_images/1285206015814758402/4cdaMv7X_400x400.jpg" class="photo-img" alt="Birthday Profile" />
        <div class="magic-sparkle photo-sparkle-1"></div>
        <div class="magic-sparkle photo-sparkle-2"></div>
      </div>

      <span class="tag">Dia Especial</span>
      <h1>Feliz Cumpleaños</h1>
      <p class="subtitle">Celebrando un año increible</p>

      <div class="divider"></div>

      <p class="main-message">
        Deseamos que este dia este lleno de momentos inolvidables.<br/>
        Que la <strong>prosperidad</strong> y el <strong>exito</strong> te acompañen siempre en cada nuevo proyecto.
      </p>

      <div class="features">
        <div class="feature-item">
          <div class="dot-icon" style="background: var(--primary);"></div>
          <span class="feature-text">Salud y Bienestar</span>
        </div>
        <div class="feature-item">
          <div class="dot-icon" style="background: var(--secondary); box-shadow: 0 0 8px var(--secondary);"></div>
          <span class="feature-text">Exito Constante</span>
        </div>
        <div class="feature-item">
          <div class="dot-icon" style="background: var(--accent); box-shadow: 0 0 8px var(--accent);"></div>
          <span class="feature-text">Nuevas Aventuras</span>
        </div>
        <div class="feature-item">
          <div class="dot-icon" style="background: #06b6d4; box-shadow: 0 0 8px #06b6d4;"></div>
          <span class="feature-text">Gran Alegria</span>
        </div>
      </div>

      <button class="main-btn" onclick="celebrate()">INICIAR CELEBRACION</button>
    </div>
    
    <!-- External sparkles floating around card -->
    <div class="magic-sparkle" style="top: 20px; left: -30px; width: 20px; height: 20px; z-index: 20;"></div>
    <div class="magic-sparkle" style="bottom: 40px; right: -25px; width: 15px; height: 15px; animation-delay: 1s; z-index: 20;"></div>
    <div class="magic-sparkle" style="top: 50%; left: -40px; width: 10px; height: 10px; animation-delay: 0.5s; z-index: 20;"></div>
    <div class="magic-sparkle" style="top: 30%; right: -30px; width: 12px; height: 12px; animation-delay: 1.5s; z-index: 20;"></div>
  </div>

  <script>
    // ── Generate Starry Background ──
    const bg = document.getElementById('bgParticles');
    
    function createStars(count, size, duration) {
      let shadows = [];
      for(let i = 0; i < count; i++) {
        shadows.push(`${Math.random() * 100}vw ${Math.random() * 100}vh rgba(255, 255, 255, ${Math.random() * 0.8 + 0.2})`);
      }
      const layer = document.createElement('div');
      layer.className = 'star-layer';
      
      const starSet = document.createElement('div');
      starSet.style.cssText = `width: ${size}px; height: ${size}px; background: transparent; box-shadow: ${shadows.join(',')}; border-radius: 50%;`;
      
      // Duplicate for seamless scrolling (optional, but let's just make them static for better performance and a beautiful look)
      layer.appendChild(starSet);
      bg.appendChild(layer);
    }

    createStars(150, 1.5, 0); // Small stars
    createStars(50, 3, 0);   // Medium stars

    // Add some random floating magic sparkles in the background
    for (let i = 0; i < 15; i++) {
      const sparkle = document.createElement('div');
      sparkle.classList.add('magic-sparkle');
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.animationDelay = Math.random() * 4 + 's';
      const size = Math.random() * 12 + 6;
      sparkle.style.width = size + 'px';
      sparkle.style.height = size + 'px';
      sparkle.style.opacity = '0.5';
      bg.appendChild(sparkle);
    }

    // ── Audio logic ──
    let audioCtx = null;
    let musicPlaying = false;
    let scheduledNodes = [];

    const MELODY = [
      [261.6, 0.5], [261.6, 0.5], [293.7, 1], [261.6, 1], [349.2, 1], [329.6, 2],
      [261.6, 0.5], [261.6, 0.5], [293.7, 1], [261.6, 1], [392.0, 1], [349.2, 2],
      [261.6, 0.5], [261.6, 0.5], [523.3, 1], [440.0, 1], [349.2, 1], [329.6, 1], [293.7, 2],
      [466.2, 0.5], [466.2, 0.5], [440.0, 1], [349.2, 1], [392.0, 1], [349.2, 2]
    ];

    function playMusic() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      scheduledNodes = [];
      let now = audioCtx.currentTime + 0.1;
      const beat = 0.55;

      MELODY.forEach(([freq, dur]) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.15, now + 0.05);
        g.gain.linearRampToValueAtTime(0, now + dur * beat);
        
        osc.connect(g).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur * beat);
        scheduledNodes.push(osc);
        now += dur * beat;
      });

      const totalTime = MELODY.reduce((acc, curr) => acc + curr[1], 0) * beat * 1000;
      scheduledNodes._timer = setTimeout(() => { if(musicPlaying) playMusic(); }, totalTime + 500);
    }

    function toggleSound(on = null) {
      musicPlaying = (on !== null) ? on : !musicPlaying;
      const btn = document.getElementById('soundBtn');
      if (musicPlaying) {
        playMusic();
        btn.textContent = "Musica: ON";
        btn.style.boxShadow = "0 0 15px var(--accent)";
        btn.style.borderColor = "var(--accent)";
      } else {
        scheduledNodes.forEach(n => n.stop());
        clearTimeout(scheduledNodes._timer);
        btn.textContent = "Musica: OFF";
        btn.style.boxShadow = "0 0 10px rgba(0,0,0,0.5)";
        btn.style.borderColor = "rgba(255,255,255,0.2)";
      }
    }

    // ── Celebration action ──
    const burstContainer = document.getElementById('burstContainer');
    function celebrate() {
      if (!musicPlaying) toggleSound(true);

      const count = 40;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'burst-icon';
          
          const rand = Math.random();
          if (rand < 0.25) {
            el.innerHTML = '<div class="gift-box"></div>';
          } else if (rand < 0.5) {
            el.innerHTML = '<div class="balloon-css" style="background:'+['#f7971e','#ff6bcb','#a855f7'][Math.floor(Math.random()*3)]+'"></div>';
          } else if (rand < 0.75) {
            el.innerHTML = '<div class="star-css" style="background:white;"></div>';
          } else {
             el.innerHTML = '<div class="magic-sparkle" style="width:30px; height:30px; filter:drop-shadow(0 0 10px white);"></div>';
          }

          el.style.left = (Math.random() * 100) + '%';
          el.style.top = '-5%'; // Start from above the screen
          burstContainer.appendChild(el);
          
          setTimeout(() => el.remove(), 3600);
        }, i * 40);
      }
    }
  </script>
</body>
</html>
