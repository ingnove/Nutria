<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feliz Cumpleaños</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #f7971e;
      --secondary: #ff6bcb;
      --accent: #a855f7;
      --bg-dark: #0f0720;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(247, 151, 30, 0.15) 0%, transparent 40%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      margin: 0;
    }

    /* ── Containers ── */
    .bg-elements { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    #burstContainer { position: fixed; inset: 0; pointer-events: none; z-index: 2000; overflow: hidden; }
    
    /* ── Magic Sparkles & Stars ── */
    .magic-sparkle {
      position: absolute;
      pointer-events: none;
      animation: float-sparkle 4s ease-in-out infinite, pulse-glow 2s ease-in-out infinite;
    }
    .magic-sparkle::before, .magic-sparkle::after {
      content: ''; position: absolute; background: white; border-radius: 50%;
      box-shadow: 0 0 10px white, 0 0 20px var(--primary);
    }
    .magic-sparkle::before { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
    .magic-sparkle::after { height: 100%; width: 2px; left: 50%; transform: translateX(-50%); }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(0.8) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.2) rotate(45deg); filter: drop-shadow(0 0 15px var(--secondary)); }
    }
    @keyframes float-sparkle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .star-css {
      width: 15px; height: 15px; background: white;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      opacity: 0.3; animation: blink 3s infinite;
      box-shadow: 0 0 10px white;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
    }
    @keyframes blink { 
      0%, 100% { opacity: 0.2; transform: scale(0.8); } 
      50% { opacity: 0.8; transform: scale(1.3); filter: drop-shadow(0 0 10px var(--accent)); } 
    }

    /* ── Floating Glow Orbs ── */
    .glow-orb {
      position: absolute; border-radius: 50%; filter: blur(20px); opacity: 0.5;
      animation: drift 10s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(30px, -30px); }
    }

    .balloon-css {
      width: 30px; height: 38px; background: var(--accent); border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      position: relative; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.3);
    }
    .balloon-css::after {
      content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
      border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 6px solid var(--accent);
    }

    /* ── Premium Card ── */
    .card {
      position: relative; z-index: 10;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 40px;
      padding: 70px 50px 50px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 30px 120px rgba(0,0,0,0.9), inset 0 0 30px rgba(255,255,255,0.05);
      animation: cardAppear 1s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 35px 130px rgba(0,0,0,0.9), 0 0 40px rgba(168, 85, 247, 0.2); 
    }

    @keyframes cardAppear {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ── Header Decoration ── */
    .card-header-deco {
      position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px;
    }
    .deco-item { animation: bounce 3s ease-in-out infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

    /* ── Photo ── */
    .photo-container {
      position: relative; width: 160px; height: 160px; margin: 0 auto 30px;
    }
    .photo-border {
      position: absolute; inset: -8px;
      background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), #06b6d4, var(--primary));
      background-size: 200% 200%;
      border-radius: 50%;
      animation: rotate-gradient 4s linear infinite;
      filter: blur(5px);
      opacity: 0.8;
    }
    .photo-border-inner {
      position: absolute; inset: -3px;
      background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), #06b6d4);
      border-radius: 50%;
      animation: rotate-gradient 6s linear infinite reverse;
    }
    @keyframes rotate-gradient { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    
    .photo-img {
      position: relative; width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
      border: 4px solid var(--bg-dark);
      z-index: 2;
    }
    
    /* Decorative sparkles around photo */
    .photo-sparkle-1 { position: absolute; top: -10px; right: -10px; width: 25px; height: 25px; z-index: 5; animation-delay: 0s; }
    .photo-sparkle-2 { position: absolute; bottom: 10px; left: -20px; width: 15px; height: 15px; z-index: 5; animation-delay: 1s; }

    /* ── Typography ── */
    .tag {
      display: inline-block; padding: 6px 15px; border-radius: 20px;
      background: rgba(247, 151, 30, 0.15); color: var(--primary);
      font-size: 0.8rem; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 15px;
      box-shadow: 0 0 15px rgba(247, 151, 30, 0.2);
    }
    h1 {
      font-family: 'Pacifico', cursive; font-size: 3.2rem; margin-bottom: 10px;
      background: linear-gradient(to right, #fff, #ffe4b5, var(--primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    .subtitle { font-size: 1.1rem; color: rgba(255,255,255,0.7); font-weight: 400; margin-bottom: 30px; letter-spacing: 1px; }

    .divider {
      width: 60px; height: 4px; background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin: 0 auto 30px; border-radius: 2px; opacity: 0.8;
      box-shadow: 0 0 10px var(--primary);
    }

    .main-message { font-size: 1.1rem; line-height: 1.8; margin-bottom: 40px; color: rgba(255,255,255,0.9); }
    .main-message strong { color: var(--secondary); font-weight: 700; text-shadow: 0 0 8px rgba(255, 107, 203, 0.4); }

    /* ── Feature Grid ── */
    .features {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px;
    }
    .feature-item {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 15px; border-radius: 20px; text-align: left;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .feature-item::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    .feature-item:hover::before { left: 150%; }
    .feature-item:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
    
    .dot-icon { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); flex-shrink: 0; box-shadow: 0 0 8px var(--primary); }
    .feature-text { font-size: 0.9rem; font-weight: 600; }

    /* ── Main Action Button ── */
    .main-btn {
      width: 100%; padding: 20px; border-radius: 25px;
      background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
      background-size: 200% auto;
      color: white; border: none; font-family: inherit;
      font-size: 1.2rem; font-weight: 800; cursor: pointer;
      box-shadow: 0 15px 40px rgba(168, 85, 247, 0.4), 0 0 20px rgba(247, 151, 30, 0.4);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; overflow: hidden;
      animation: shimmer 3s infinite linear;
    }
    @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
    .main-btn:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(168, 85, 247, 0.6), 0 0 30px rgba(247, 151, 30, 0.6); }
    .main-btn:active { transform: scale(0.95); }

    /* ── Controls ── */
    .controls { position: fixed; top: 30px; right: 30px; z-index: 100; }
    .control-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 20px; border-radius: 15px; color: white; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; backdrop-filter: blur(10px);
      transition: all 0.3s;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .control-btn:hover { background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

    /* ── Burst Elements ── */
    .burst-icon {
      position: absolute; pointer-events: none;
      animation: icon-float 2.5s ease-out forwards;
    }
    @keyframes icon-float {
      0% { transform: translate(-50%, -50%) scale(0) rotate(0); opacity: 1; filter: brightness(1); }
      20% { transform: translate(-50%, -150%) scale(1.2) rotate(45deg); opacity: 1; filter: brightness(1.5); }
      100% { transform: translate(-50%, 400px) scale(1) rotate(360deg); opacity: 0; filter: brightness(0.8); }
    }

    .gift-box {
      width: 30px; height: 30px; background: var(--secondary); position: relative; border-radius: 4px;
      box-shadow: 0 0 15px rgba(255, 107, 203, 0.5);
    }
    .gift-box::before { content:''; position:absolute; top:50%; left:0; width:100%; height:4px; background:white; transform:translateY(-50%); }
    .gift-box::after { content:''; position:absolute; left:50%; top:0; width:4px; height:100%; background:white; transform:translateX(-50%); }

  </style>
</head>
<body>

  <div class="bg-elements" id="bgParticles">
    <!-- Glow Orbs -->
    <div class="glow-orb" style="width: 200px; height: 200px; background: var(--primary); top: -50px; left: -50px; animation-delay: 0s;"></div>
    <div class="glow-orb" style="width: 300px; height: 300px; background: var(--accent); bottom: -100px; right: -50px; animation-delay: 2s;"></div>
  </div>
  <div id="burstContainer"></div>

  <div class="controls">
    <button class="control-btn" id="soundBtn" onclick="toggleSound()">Musica: OFF</button>
  </div>

  <div class="card">
    <div class="card-header-deco">
      <div class="deco-item"><div class="balloon-css" style="background: var(--primary);"></div></div>
      <div class="deco-item" style="animation-delay: 0.5s;"><div class="balloon-css" style="background: var(--secondary);"></div></div>
      <div class="deco-item" style="animation-delay: 1s;"><div class="balloon-css" style="background: var(--accent);"></div></div>
    </div>

    <!-- Decorative floating sparkles around the card -->
    <div class="magic-sparkle" style="top: 20px; left: 20px; width: 20px; height: 20px;"></div>
    <div class="magic-sparkle" style="bottom: 40px; right: 30px; width: 15px; height: 15px; animation-delay: 1s;"></div>
    <div class="magic-sparkle" style="top: 50%; left: -20px; width: 10px; height: 10px; animation-delay: 0.5s;"></div>
    <div class="magic-sparkle" style="top: 30%; right: -15px; width: 12px; height: 12px; animation-delay: 1.5s;"></div>

    <div class="photo-container">
      <div class="photo-border"></div>
      <div class="photo-border-inner"></div>
      <img src="https://pbs.twimg.com/profile_images/1285206015814758402/4cdaMv7X_400x400.jpg" class="photo-img" alt="Birthday Profile" />
      <div class="magic-sparkle photo-sparkle-1"></div>
      <div class="magic-sparkle photo-sparkle-2"></div>
    </div>

    <span class="tag">Dia Especial</span>
    <h1>Feliz Cumpleaños</h1>
    <p class="subtitle">Celebrando un año increible</p>

    <div class="divider"></div>

    <p class="main-message">
      Deseamos que este dia este lleno de momentos inolvidables.<br/>
      Que la <strong>prosperidad</strong> y el <strong>exito</strong> te acompañen siempre en cada nuevo proyecto.
    </p>

    <div class="features">
      <div class="feature-item">
        <div class="dot-icon" style="background: var(--primary);"></div>
        <span class="feature-text">Salud y Bienestar</span>
      </div>
      <div class="feature-item">
        <div class="dot-icon" style="background: var(--secondary); box-shadow: 0 0 8px var(--secondary);"></div>
        <span class="feature-text">Exito Constante</span>
      </div>
      <div class="feature-item">
        <div class="dot-icon" style="background: var(--accent); box-shadow: 0 0 8px var(--accent);"></div>
        <span class="feature-text">Nuevas Aventuras</span>
      </div>
      <div class="feature-item">
        <div class="dot-icon" style="background: #06b6d4; box-shadow: 0 0 8px #06b6d4;"></div>
        <span class="feature-text">Gran Alegria</span>
      </div>
    </div>

    <button class="main-btn" onclick="celebrate()">INICIAR CELEBRACION</button>
  </div>

  <script>
    // ── Static background elements ──
    const bg = document.getElementById('bgParticles');
    
    // Add CSS Stars
    for (let i = 0; i < 35; i++) {
      const star = document.createElement('div');
      star.classList.add('star-css');
      star.style.position = 'absolute';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      // Varying sizes
      const size = Math.random() * 15 + 5;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      bg.appendChild(star);
    }

    // Add Magic Sparkles
    for (let i = 0; i < 20; i++) {
      const sparkle = document.createElement('div');
      sparkle.classList.add('magic-sparkle');
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.animationDelay = Math.random() * 4 + 's';
      const size = Math.random() * 15 + 5;
      sparkle.style.width = size + 'px';
      sparkle.style.height = size + 'px';
      bg.appendChild(sparkle);
    }

    // ── Audio logic ──
    let audioCtx = null;
    let musicPlaying = false;
    let scheduledNodes = [];

    const MELODY = [
      [261.6, 0.5], [261.6, 0.5], [293.7, 1], [261.6, 1], [349.2, 1], [329.6, 2],
      [261.6, 0.5], [261.6, 0.5], [293.7, 1], [261.6, 1], [392.0, 1], [349.2, 2],
      [261.6, 0.5], [261.6, 0.5], [523.3, 1], [440.0, 1], [349.2, 1], [329.6, 1], [293.7, 2],
      [466.2, 0.5], [466.2, 0.5], [440.0, 1], [349.2, 1], [392.0, 1], [349.2, 2]
    ];

    function playMusic() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      scheduledNodes = [];
      let now = audioCtx.currentTime + 0.1;
      const beat = 0.55;

      MELODY.forEach(([freq, dur]) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.15, now + 0.05);
        g.gain.linearRampToValueAtTime(0, now + dur * beat);
        
        osc.connect(g).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur * beat);
        scheduledNodes.push(osc);
        now += dur * beat;
      });

      const totalTime = MELODY.reduce((acc, curr) => acc + curr[1], 0) * beat * 1000;
      scheduledNodes._timer = setTimeout(() => { if(musicPlaying) playMusic(); }, totalTime + 500);
    }

    function toggleSound(on = null) {
      musicPlaying = (on !== null) ? on : !musicPlaying;
      const btn = document.getElementById('soundBtn');
      if (musicPlaying) {
        playMusic();
        btn.textContent = "Musica: ON";
        btn.style.boxShadow = "0 0 15px var(--accent)";
        btn.style.borderColor = "var(--accent)";
      } else {
        scheduledNodes.forEach(n => n.stop());
        clearTimeout(scheduledNodes._timer);
        btn.textContent = "Musica: OFF";
        btn.style.boxShadow = "0 0 10px rgba(0,0,0,0.5)";
        btn.style.borderColor = "rgba(255,255,255,0.2)";
      }
    }

    // ── Celebration action ──
    const burstContainer = document.getElementById('burstContainer');
    function celebrate() {
      if (!musicPlaying) toggleSound(true);

      const count = 40;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'burst-icon';
          
          const rand = Math.random();
          if (rand < 0.25) {
            el.innerHTML = '<div class="gift-box"></div>';
          } else if (rand < 0.5) {
            el.innerHTML = '<div class="balloon-css" style="background:'+['#f7971e','#ff6bcb','#a855f7'][Math.floor(Math.random()*3)]+'"></div>';
          } else if (rand < 0.75) {
            el.innerHTML = '<div class="star-css" style="opacity:1; width:25px; height:25px; background:white; filter:drop-shadow(0 0 10px gold);"></div>';
          } else {
             el.innerHTML = '<div class="magic-sparkle" style="width:30px; height:30px; filter:drop-shadow(0 0 10px white);"></div>';
          }

          // Use percentages safely within a container
          el.style.left = (5 + Math.random() * 90) + '%';
          el.style.top = (60 + Math.random() * 20) + '%';
          burstContainer.appendChild(el);
          
          setTimeout(() => el.remove(), 2600);
        }, i * 40);
      }
    }
  </script>
</body>
</html>
